<HTML>
    <head>

          <link rel="stylesheet" href="astyle.css">
    </head>
<body>


        <div style="float:enter; display:block;" >
  
   <ul class="playlist" id="playlist">
            <!-- SOSTITUISCI I LINK QUI SOTTO CON I TUOI -->
             <div class="canale">
               <script>
  const listaCanali = document.getElementById('playlist');

fetch('https://raw.githubusercontent.com/cix76/cix76.github.io/refs/heads/main/list_jason.json')
  .then(response => {
    if (!response.ok) throw new Error("Errore nel caricamento del file JSON");
    return response.json();
  })
  .then(data => {
    data.channels.forEach(canale => {
      const li = document.createElement('li');
      
      // Aggiungiamo una classe CSS (opzionale) per far capire che è cliccabile
      li.style.cursor = "playlist";

      /* ORIGINALE
      li.innerHTML = `
        <strong>${canale.lcn}</strong> - 
        <span>${canale.name}</span> 
        ${canale.hd ? '<small>(HD)</small>' : ''}
        <br>
        <a href="${canale.url}" target="_blank">Guarda Streaming</a>
      `;*/

      li.innerHTML = `
        <div class="p1">${canale.lcn}</div> 
        <div class="img-logo"><img class="logo" src=${canale.logo}></div>
        <div class="p2">${canale.name}</div> 
        ${canale.hd ? '<small>(HD)</small>' : ''}
 
      `;

      // --- AGGIUNTA FUNZIONE ONCLICK ---
      li.addEventListener('click', (event) => {
        // Logica da eseguire al click
        parent.fr1.canaliTV(canale.url);
        
        // Esempio: se vuoi che il click sul LI apra lo streaming 
        // (facendo la stessa cosa del link <a>)
        // window.open(canale.url, '_blank');
      });
      // ---------------------------------

      listaCanali.appendChild(li);
    });
  })
  .catch(error => console.error("Errore:", error));


    </script>
           
</div>

</BODY>
</HTML>
