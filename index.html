<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CIX76 TV</title>
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d; color: #eee;
    font-family: system-ui, sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  #header {
    background: #1a1a1a; padding: 8px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 2px solid #E53935; flex-shrink: 0; height: 44px;
  }
  #header h1 { font-size: 18px; font-weight: 800; color: #E53935; letter-spacing: 1px; }
  #now-playing { font-size: 13px; color: #aaa; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #main { display: flex; flex: 1; overflow: hidden; }
  #player-wrap { flex: 1; background: #000; position: relative; min-width: 0; }
  .video-js { width: 100% !important; height: 100% !important; }
  #my-video { width: 100%; height: 100%; }
  .video-js .vjs-play-progress { background-color: #E53935 !important; }
  .video-js .vjs-big-play-button { border-color: #E53935 !important; background-color: rgba(229,57,53,0.3) !important; }
  #error-msg {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(229,57,53,0.15); border: 1px solid #E53935;
    color: #ff6b6b; padding: 12px 20px; border-radius: 8px;
    font-size: 14px; display: none; z-index: 10; pointer-events: none;
  }
  #sidebar {
    width: 280px; flex-shrink: 0; background: #121212;
    display: flex; flex-direction: column; border-left: 1px solid #222;
  }
  #search-wrap { padding: 8px; border-bottom: 1px solid #222; flex-shrink: 0; }
  #search {
    width: 100%; background: #2a2a2a; border: 1px solid #333;
    border-radius: 6px; padding: 7px 10px; color: #eee; font-size: 13px; outline: none;
  }
  #search:focus { border-color: #E53935; }
  #search::placeholder { color: #666; }
  #channel-count { font-size: 11px; color: #555; padding: 4px 8px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
  #channel-list { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
  .ch-item {
    display: flex; align-items: center; padding: 8px 10px;
    cursor: pointer; border-bottom: 1px solid #1a1a1a; transition: background 0.1s; gap: 10px;
  }
  .ch-item:hover { background: #1e1e1e; }
  .ch-item.active { background: #1a1a1a; border-left: 3px solid #E53935; }
  .ch-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; border-radius: 4px; background: #1a1a1a; }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-num { font-size: 11px; color: #555; margin-top: 2px; }
  .ch-hd { font-size: 10px; background: #E53935; color: white; padding: 1px 5px; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
  @media (max-width: 700px) {
    #main { flex-direction: column; }
    #player-wrap { height: 56vw; min-height: 200px; flex: none; }
    #sidebar { width: 100%; flex: 1; border-left: none; border-top: 1px solid #222; }
  }
</style>
</head>
<body>
<div id="header">
  <h1>📺 CIX76</h1>
  <span id="now-playing">Seleziona un canale...</span>
</div>
<div id="main">
  <div id="player-wrap">
    <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay playsinline></video>
    <div id="error-msg">⚠️ Stream non disponibile</div>
  </div>
  <div id="sidebar">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="🔍 Cerca canale..." oninput="filterChannels(this.value)">
    </div>
    <div id="channel-count"></div>
    <div id="channel-list"></div>
  </div>
</div>
<script>
var vjsPlayer = null;
var dashPlayer = null;
var currentLi = null;
var allChannels = [];

vjsPlayer = videojs('my-video', {
  techOrder: ['html5'],
  html5: {
    vhs: {
      overrideNative: true,
      enableLowInitialPlaylist: false,
      smoothQualityChange: true,
      allowSeeksWithinUnsafeLiveWindow: true,
    },
    nativeAudioTracks: false,
    nativeVideoTracks: false,
  },
  liveui: true,
  fill: true,
});

vjsPlayer.on('error', function() {
  document.getElementById('error-msg').style.display = 'block';
});
vjsPlayer.on('playing', function() {
  document.getElementById('error-msg').style.display = 'none';
});

// URL del Cloudflare Worker proxy (da aggiornare dopo il deploy)
var PROXY_URL = 'https://rai-proxy.francescoingargiola76.workers.dev';

function resolveUrl(url) {
  // Se è un relinker RAI, passa dal proxy
  if (url.includes('mediapolis.rai.it/relinker')) {
    return PROXY_URL + '?url=' + encodeURIComponent(url);
  }
  return url;
}

function playUrl(url, li, name) {
  if (currentLi) currentLi.classList.remove('active');
  currentLi = li;
  li.classList.add('active');
  document.getElementById('now-playing').textContent = '▶ ' + name;
  document.getElementById('error-msg').style.display = 'none';

  var resolvedUrl = resolveUrl(url);

  if (resolvedUrl.includes('.mpd')) {
    if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
    var video = document.getElementById('my-video_html5_api') || vjsPlayer.el().querySelector('video');
    dashPlayer = dashjs.MediaPlayer().create();
    dashPlayer.initialize(video, resolvedUrl, true);
    dashPlayer.on(dashjs.MediaPlayer.events.ERROR, function() {
      document.getElementById('error-msg').style.display = 'block';
    });
  } else {
    if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
    vjsPlayer.src({ src: resolvedUrl, type: 'application/x-mpegURL' });
    vjsPlayer.play();
  }
}

function renderChannels(channels) {
  var list = document.getElementById('channel-list');
  list.innerHTML = '';
  document.getElementById('channel-count').textContent = channels.length + ' canali';
  channels.forEach(function(ch) {
    var li = document.createElement('div');
    li.className = 'ch-item';
    li.innerHTML =
      '<img class="ch-logo" src="' + (ch.logo||'') + '" onerror="this.style.display=\'none\'">' +
      '<div class="ch-info"><div class="ch-name">' + ch.name + '</div><div class="ch-num">Canale ' + ch.lcn + '</div></div>' +
      (ch.hd ? '<span class="ch-hd">HD</span>' : '');
    li.addEventListener('click', (function(channel){ return function(){ playUrl(channel.url, li, channel.name); }; })(ch));
    list.appendChild(li);
  });
}

function filterChannels(query) {
  var q = query.toLowerCase();
  renderChannels(allChannels.filter(function(ch){ return ch.name.toLowerCase().includes(q); }));
}

fetch('https://raw.githubusercontent.com/cix76/cix76.github.io/refs/heads/main/list_jason.json')
  .then(function(r){ return r.json(); })
  .then(function(data){
    allChannels = data.channels;
    renderChannels(allChannels);
    if (allChannels.length > 0) {
      var firstLi = document.getElementById('channel-list').firstChild;
      if (firstLi) playUrl(allChannels[0].url, firstLi, allChannels[0].name);
    }
  })
  .catch(function(){
    document.getElementById('error-msg').textContent = 'Errore caricamento canali';
    document.getElementById('error-msg').style.display = 'block';
  });
</script>
</body>
</html>
